    <style>
        body {
            background: black;
            font-family: Arial, sans-serif;
            color: hotpink;
            text-align: center;
            margin: 0;
            padding-bottom: 50px;
        }

        /* 顶部导航容器 */
        .nav {
            padding: 20px;
            border-bottom: 2px solid hotpink;
            margin-bottom: 30px;
            background: rgba(255, 20, 147, 0.05);
        }

        /* HOME 按钮样式 */
        .nav a {
            color: pink;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
            text-shadow: 0 0 5px hotpink;
            transition: 0.3s;
            display: inline-block;
            vertical-align: middle;
        }

        /* 鼠标指上去的效果：变白并发强光 */
        .nav a:hover {
            color: white;
            text-shadow: 0 0 15px #ff00ff, 0 0 25px #ff00ff;
            transform: scale(1.1);
        }

        /* 导航内的图标样式 */
        .nav img {
            width: 30px;
            margin: 0 10px;
            vertical-align: middle;
            transition: 0.3s;
        }
        
        .nav img:hover {
            filter: drop-shadow(0 0 8px hotpink);
            transform: scale(1.2);
        }

        /* 城市条链接容器 */
        .city-link {
            display: block;
            text-decoration: none;
            color: inherit;
            margin: 15px auto;
            width: 90%;
            max-width: 800px;
        }

        /* 城市条盒子 */
        .city {
            padding: 20px;
            border-top: 2px solid hotpink;
            border-bottom: 2px solid hotpink;
            position: relative;
            background: rgba(255, 20, 147, 0.02);
            transition: 0.3s;
        }

        .city:hover {
            background: rgba(255, 20, 147, 0.1);
        }

        /* 左右粉色渐变光效 */
        .city::before,
        .city::after {
            content: "";
            position: absolute;
            top: 0;
            width: 80px;
            height: 100%;
            pointer-events: none; /* 防止遮挡点击 */
        }

        .city::before {
            left: 0;
            background: linear-gradient(to right, hotpink, transparent);
        }

        .city::after {
            right: 0;
            background: linear-gradient(to left, hotpink, transparent);
        }
    </style>
</head>
