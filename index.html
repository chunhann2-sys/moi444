<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City List - Sakura Style</title>
    <style>
        body {
            background: #fffafa;
            font-family: Arial, sans-serif;
            color: #d02090;
            text-align: center;
            margin: 0;
            padding-bottom: 50px;
        }

        /* 顶部导航容器 */
        .nav {
            padding: 15px;
            background: #ffe4e1;
            margin-bottom: 40px;
            box-shadow: 0 2px 5px rgba(208, 32, 144, 0.1);
        }

        /* 导航链接 */
        .nav a {
            color: #b03060;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
            transition: 0.3s;
            display: inline-block;
            vertical-align: middle;
        }

        .nav a:hover {
            color: #ff1493;
            transform: scale(1.1);
        }

        /* 导航图标 */
        .nav img {
            width: 25px;
            margin: 0 10px;
            vertical-align: middle;
            transition: 0.3s;
            filter: drop-shadow(0 0 3px rgba(208, 32, 144, 0.3));
        }

        .nav img:hover {
            filter: drop-shadow(0 0 6px hotpink);
            transform: scale(1.2);
        }

        /* 城市列表项 */
        .city-link {
            display: block;
            text-decoration: none;
            color: inherit;
            margin: 10px auto;
            width: 85%;
            max-width: 650px;
        }

        .city {
            padding: 18px;
            background: #ffb6c1;
            border-radius: 10px;
            position: relative;
            transition: 0.3s;
            box-shadow: 0 4px 8px rgba(208, 32, 144, 0.1);
        }

        .city:hover {
            background: #ffc0cb;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(208, 32, 144, 0.15);
        }
    </style>
</head>
